localization_node:
  ros__parameters:
    detection_topic: /perception/detections
    localized_topic: /localization/targets
    camera_info_topic: /camera/camera_info
    depth_image_topic: /camera/depth/image_raw
    enable_depth_assist: true
    depth_timeout_sec: 1.0
    depth_roi_scale: 0.35
    floor_z_in_base: 0.0
    qr_size_m: 0.08
    apriltag_size_m: 0.10
    parcel_box_dims_m: [0.30, 0.20, 0.18]
