topdown_odom_viewer_node:
  ros__parameters:
    odom_topic: /odom
    window_name: g1_light_tracking ROS2 Top-Down
    scale_px_per_m: 80.0
    canvas_width: 760
    canvas_height: 760
    max_points: 3000
    use_global_frame: true
    global_frame: map
    odom_frame: odom
    base_frame: base_link
    draw_local_path: true
