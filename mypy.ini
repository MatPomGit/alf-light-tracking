; [AI-CHANGE | 2026-04-28 09:48 UTC | v0.204]
; CO ZMIENIONO: Dodano konfigurację `mypy` dla strategii CI typu „szybko i praktycznie” z ograniczeniem analizy do kodu biznesowego.
; DLACZEGO: Środowisko CI bez pełnego ROS2/Qt powoduje błędy importów, które maskują rzeczywiste problemy typów w logice domenowej.
; JAK TO DZIAŁA: `mypy` analizuje tylko katalog `rosbag` (moduł biznesowy bez zależności ROS/UI), a brakujące importy są ignorowane, aby pipeline zwracał stabilny sygnał jakości.
; TODO: Po dojrzeniu typowania w modułach `ros` i `ui` przejść na ignorowanie per-moduł (`rclpy.*`, `launch.*`, `PySide6.*`) i wyłączyć globalne ignore.
[mypy]
python_version = 3.12
ignore_missing_imports = True
files = ros2_ws/robot_mission_control/robot_mission_control/rosbag
warn_unused_ignores = True
pretty = True
