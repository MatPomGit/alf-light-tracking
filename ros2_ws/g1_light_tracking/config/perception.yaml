light_spot_detector_node:
  ros__parameters:
    camera_topic: /camera/image_raw
    detection_topic: /light_tracking/detection_json
    camera_frame: camera_link
    brightness_threshold: 245
    min_area: 6.0
    min_detection_confidence: 0.62
    # [AI-CHANGE | 2026-04-17 11:41 UTC | v0.74]
    # CO ZMIENIONO: Dodano parametr `min_detection_score` do konfiguracji percepcji.
    # DLACZEGO: Utrzymujemy kompatybilność z nowym parametrem w nodzie i bezpieczny
    # domyślny próg, który nie odrzuca poprawnych detekcji po migracji konfiguracji.
    # JAK TO DZIAŁA: Wartość 0.0 pozostawia drugi etap filtrowania jakości detekcji
    # w trybie neutralnym, a właściwe zaostrzenie progu może być ustawione świadomie.
    # TODO: Dodać profil środowiskowy (np. indoor/outdoor) z rekomendowanym progiem
    # `min_detection_score` opartym o realne metryki jakości detekcji.
    min_detection_score: 0.0
    min_persistence_frames: 1
    blur_kernel: 5
    morph_kernel: 3
    legacy_mode: false
