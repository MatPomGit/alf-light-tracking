light_spot_detector_node:
  ros__parameters:
    camera_topic: /camera/image_raw
    detection_topic: /light_tracking/detection_json
    camera_frame: camera_link
    brightness_threshold: 245
    min_area: 10.0
    min_detection_confidence: 0.0
    min_detection_score: 0.0
    min_top1_top2_margin: 0.0
    min_mean_contrast: 4.0
    min_peak_sharpness: 6.0
    max_saturated_ratio: 0.35
    confidence_weight_shape: 0.32
    confidence_weight_brightness: 0.22
    confidence_weight_contrast: 0.24
    confidence_weight_sharpness: 0.22
    min_persistence_frames: 1
    blur_kernel: 5
    morph_kernel: 3
    legacy_mode: false
