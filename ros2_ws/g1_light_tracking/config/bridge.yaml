unitree_cmd_vel_bridge_node:
  ros__parameters:
    cmd_vel_topic: /cmd_vel
    unitree_request_topic: /api/sport/request
    api_response_topic: /api/sport/response

    # Limity prędkości bridge
    max_vx: 1.0
    max_vy: 1.0
    max_vyaw: 0.8

    # Timeout i częstotliwość publikacji
    cmd_timeout_s: 0.5
    publish_rate_hz: 10.0
    velocity_duration_s: 0.2

    # Sekwencja startowa G1 loco API
    switch_to_normal: true
    startup_delay_s: 1.5
    start_fsm_id: 500
    enable_balance_mode: true
    balance_mode: 1

    # Logi diagnostyczne
    log_cmd_vel_rx: true
    log_cmd_vel_tx: true
    log_subscribers: true
    log_interval_s: 1.0

    # [AI-CHANGE | 2026-04-20 06:28 UTC | v0.135]
    # CO ZMIENIONO: Dodano parametry integracji z modułem E-STOP:
    #   - `estop_active_topic`,
    #   - `stop_command_min_interval_s`.
    # DLACZEGO: Przy potencjalnym kolejkowaniu zadań po stronie robota sam `cmd_vel=0` może być niewystarczający.
    #   Bridge powinien otrzymać jawny sygnał STOP i wysyłać hard-stop do API robota.
    # JAK TO DZIAŁA: `estop_active_topic` wskazuje topic Bool z modułu E-STOP (`true`=STOP), a
    #   `stop_command_min_interval_s` ogranicza częstotliwość wysyłania komendy stop.
    # TODO: Dobrać profil `stop_command_min_interval_s` per platforma (G1/symulator), by zbalansować szybkość i obciążenie API.
    estop_active_topic: /emergency_stop/active
    stop_command_min_interval_s: 0.2
