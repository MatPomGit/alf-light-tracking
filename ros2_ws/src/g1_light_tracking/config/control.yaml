control_node:
  ros__parameters:
    mission_topic: /mission/target
    depth_hint_topic: /navigation/depth_hint
    cmd_vel_topic: /cmd_vel/raw
    linear_speed: 0.15
    angular_speed: 0.50
    stop_distance_m: 0.60
    use_depth_navigation: true
    min_safe_clearance_m: 0.70
    obstacle_stop_clearance_m: 0.45
    depth_turn_gain: 0.60
    kp_angular: 0.8
    ki_angular: 0.05
    kd_angular: 0.1
    kp_linear: 0.4
    ki_linear: 0.02
    kd_linear: 0.05
    max_angular_speed: 1.2     # rad/s
    max_linear_speed: 0.4      # m/s
    error_deadzone_angular: 5.0   # piksele (kątowy deadzone)
    error_deadzone_linear: 20.0   # piksele
    error_filter_alpha: 0.3
    linear_speed_scaling: true
    depth_reference: 1.0       # metry
    image_width: 640
    camera_hfov: 1.047         # 60 stopni w radianach
