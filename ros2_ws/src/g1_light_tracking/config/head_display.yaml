head_display_state_node:
  ros__parameters:
    mission_state_topic: /mission/state
    mission_target_topic: /mission/target
    tracked_target_topic: /tracking/targets

    # Wejścia bezpieczeństwa; topici można podmienić pod safety_stop_node.
    estop_topic: /safety/estop
    safety_warning_topic: /safety/warning

    # Warstwa transportu: ros_topic albo vendor_bridge.
    output_mode: ros_topic
    output_topic: /head_display/command
    vendor_output_topic: /unitree/head_display/command

    publish_hz: 20.0
    mission_timeout_s: 2.0
    brightness: 0.55

    fallback_effect: diagnostic
    idle_effect: idle
    safety_warning_effect: terminal_error
    estop_effect: estop

    palette:
      blue_soft: [0.15, 0.3, 1.0]
      turquoise: [0.0, 0.9, 0.8]
      violet: [0.5, 0.1, 1.0]
      amber: [1.0, 0.55, 0.05]
      white: [1.0, 1.0, 1.0]
      cyan: [0.0, 1.0, 1.0]
      green: [0.0, 1.0, 0.2]
      gold: [1.0, 0.8, 0.15]
      red: [1.0, 0.0, 0.0]
      diag_neutral: [0.8, 0.8, 0.8]

    effects:
      idle:
        kind: pulse
        color: blue_soft
        period_s: 2.2

      search_scan:
        kind: scan
        color_a: turquoise
        color_b: violet
        speed: 0.8

      approach:
        kind: pulse
        color: amber
        min_period_s: 0.25
        max_period_s: 1.8

      align:
        kind: scan
        color_a: white
        color_b: cyan
        speed: 0.45

      drop:
        kind: solid
        color: green

      handover_ready:
        kind: solid
        color: gold

      terminal_error:
        kind: blink
        color: red
        hz: 2.5

      estop:
        kind: strobe
        color: red

      diagnostic:
        kind: pulse
        color: diag_neutral
        period_s: 1.0

    # Mapowanie stanu MissionState.state na nazwę efektu.
    state_map:
      idle: idle
      search: search_scan
      navigate: search_scan
      approach: approach
      approach_person: approach
      align: align
      drop: drop
      handover_ready: handover_ready
      terminal: terminal_error
      error: terminal_error
      failed: terminal_error
