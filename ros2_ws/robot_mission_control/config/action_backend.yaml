# [AI-CHANGE | 2026-04-29 13:15 UTC | v0.332]
# CO ZMIENIONO: Zmieniono moduł typu akcji z `robot_mission_control_interfaces.action` na `robot_mission_control.action`.
# DLACZEGO: Kontrakt `MissionStep` jest teraz generowany w tym samym pakiecie co aplikacja, więc stara nazwa pakietu
#           prowadziłaby do błędu importu i niepewnego stanu backendu.
# JAK TO DZIAŁA: Bootstrap ładuje lokalny typ `robot_mission_control.action.MissionStep`; jeśli import się nie powiedzie,
#                backend pozostaje w bezpiecznym fallbacku zamiast udawać dostępność Action.
# TODO: Dodać walidację schematu YAML i test importu wygenerowanego typu po `colcon build`.
action_name: "/mission_control/execute_step"
action_type_module: "robot_mission_control.action"
action_type_name: "MissionStep"
node_name: "robot_mission_control_action_client"
server_wait_timeout_sec: 1.0
future_wait_timeout_sec: 2.0
# [AI-CHANGE | 2026-04-23 21:40 UTC | v0.198]
# CO ZMIENIONO: Doprecyzowano finalny kontrakt Goal/Feedback/Result i mapowania statusów
#               bezpośrednio w `action_backend.yaml`.
# DLACZEGO: Usuwa to rozjazd między kodem i konfiguracją, a klient Action może działać E2E
#           w scenariuszu nominalnym bez fallbacku `action_backend_unavailable`.
# JAK TO DZIAŁA: `goal_payload_map` mapuje szybkie akcje UI na payload Goal,
#                `result.status_map` normalizuje statusy domenowe, a `display_fields`
#                wskazuje jakie pola wyniku prezentować operatorowi.
# TODO: Dodać walidację schematu tych pól (typy i kompletność mapy) na etapie startu aplikacji.
goal_payload_map:
  start_patrol:
    goal: "start_patrol"
  return_to_base:
    goal: "return_to_base"
  pause_mission:
    goal: "pause_mission"
  resume_mission:
    goal: "resume_mission"
feedback:
  progress_range: [0.0, 1.0]
result:
  status_map:
    ACCEPTED: "ACCEPTED"
    RUNNING: "RUNNING"
    CANCEL_REQUESTED: "CANCEL_REQUESTED"
    SUCCEEDED: "SUCCEEDED"
    CANCELED: "CANCELED"
    ABORTED: "ABORTED"
    UNKNOWN: "UNKNOWN"
  display_fields:
    - "outcome"
