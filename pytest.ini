# [AI-CHANGE | 2026-04-29 13:15 UTC | v0.332]
# CO ZMIENIONO: Dodano globalną konfigurację discovery Pytest ignorującą artefakty cache i katalogi build/install.
# DLACZEGO: Testy uruchamiane z katalogu repo mogą próbować kolekcjonować niedostępne katalogi `pytest-cache-files-*`
#           pozostawione przez wcześniejsze przebiegi na Windows, co zatrzymuje testy przed wykonaniem asercji.
# JAK TO DZIAŁA: `norecursedirs` blokuje rekursję w katalogi tymczasowe, cache oraz typowe artefakty ROS2/pytest.
# TODO: Rozważyć dodanie `testpaths = ros2_ws/robot_mission_control/tests`, jeśli repo zacznie mieć wiele niezależnych pakietów testowych.
[pytest]
norecursedirs =
    .git
    .pytest_cache
    .pytest_tmp
    __pycache__
    build
    install
    log
    pytest-cache-files-*
    pytest-tmp-root
